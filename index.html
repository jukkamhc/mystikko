            margin-right: 5px;
        }

        .quote::after {
            content: '"';
            font-size: 3rem;
            color: #bdc3c7;
            position: relative;
            top: 15px;
            margin-left: 5px;
        }

        .author {

            color: #7f8c8d;
            font-style: normal;
        }

            padding: 15px 40px;
            font-size: 1rem;
            border-radius: 50px;

            font-family: 'Georgia', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .quote {
